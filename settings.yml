enable_on_desktop:
  default: true
  type: bool

enable_on_mobile:
  default: true
  type: bool

day_scene_opacity:
  default: 0.9
  type: float
  min: 0
  max: 1
  step: 0.05

night_scene_opacity:
  default: 1
  type: float
  min: 0
  max: 1
  step: 0.05

motion_strength:
  default: "normal"
  type: enum
  choices:
    - "subtle"
    - "normal"
    - "enhanced"

content_backdrop_strength:
  default: 0.7
  type: float
  min: 0
  max: 1
  step: 0.05
